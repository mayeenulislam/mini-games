<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Games | চটজলদি খেলা</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600;700&family=Fredoka+One&family=Noto+Sans+Arabic:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-yellow: #FFD93D;
            --primary-orange: #FF8400;
            --primary-pink: #FF6B6B;
            --primary-blue: #4D96FF;
            --primary-green: #6BCB77;
        }

        body {
            font-family: 'Hind Siliguri', 'Fredoka One', sans-serif;
            background-color: #f0f9ff;
            background-image: radial-gradient(#d1e9ff 2px, transparent 2px);
            background-size: 32px 32px;
        }

        .arabic-text {
            font-family: 'Noto Sans Arabic', sans-serif;
        }

        .game-card {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 4px solid transparent;
        }

        .game-card:hover {
            transform: scale(1.05) rotate(1deg);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-color: var(--primary-orange);
        }

        .floating {
            animation: floating 3s ease-in-out infinite;
        }

        @keyframes floating {
            0% { transform: translatey(0px); }
            50% { transform: translatey(-10px); }
            100% { transform: translatey(0px); }
        }

        .btn-toggle {
            transition: all 0.2s;
        }

        .btn-toggle:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body class="min-h-screen pb-20">

    <!-- Language Toggle & Header -->
    <header class="container mx-auto px-4 pt-8 pb-12 text-center">
        <div class="flex justify-end mb-6">
            <button onclick="toggleLanguage()" id="langBtn" class="btn-toggle bg-white border-4 border-blue-400 px-6 py-2 rounded-full font-bold text-blue-600 hover:bg-blue-50 shadow-lg">
                English
            </button>
        </div>

        <div class="relative inline-block">
            <h1 id="mainTitle" class="text-5xl md:text-7xl font-bold text-orange-500 drop-shadow-lg mb-4">
                চটজলদি খেলা
            </h1>
            <div class="absolute -top-8 -right-8 w-16 h-16 floating opacity-80">
                <svg viewBox="0 0 100 100" class="fill-yellow-400"><path d="M50 0 L60 40 L100 50 L60 60 L50 100 L40 60 L0 50 L40 40 Z"/></svg>
            </div>
        </div>
        
        <p id="subTitle" class="text-xl md:text-2xl text-blue-700 font-medium max-w-2xl mx-auto mt-4">
            এসো খেলি, শিখি এবং মজা করি!
        </p>

        <!-- Fun Arabic Welcome Text -->
        <p class="arabic-text text-2xl text-pink-500 mt-4 dir-rtl">أهلاً بكم في عالم الألعاب</p>
    </header>

    <!-- Games Grid -->
    <main class="container mx-auto px-4">
        <div id="gamesGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            <!-- Game cards will be injected here by JS -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="mt-20 text-center text-blue-400 font-medium">
        <p>© <span id="year"></span> Mini Games - Built with ❤️</p>
    </footer>

    <script>
        // Game Data Configuration
        // To add a new game, simply add a new object to this array
        const games = [
            {
                id: 'dot-connector',
                title: { bn: 'বিন্দু সংযোগ', en: 'Dot Connector' },
                description: { 
                    bn: 'বিন্দুগুলো এক টানে যুক্ত করো, কোনো বিন্দু দুবার ছোঁয়া যাবে না!', 
                    en: 'Connect all the dots in a single path without repeating any dot!' 
                },
                link: './dot-connector/',
                icon: '🎨',
                color: 'bg-yellow-100',
                borderColor: 'border-yellow-400'
            },
            {
                id: 'number-pattern',
                title: { bn: 'সংখ্যার ধাঁধা', en: 'Number Pattern' },
                description: { 
                    bn: 'প্যাটার্নটি বুঝে পরবর্তী সংখ্যাটি বের করো।', 
                    en: 'Understand the pattern and guess the next number in the sequence.' 
                },
                link: 'https://mayeenulislam.github.io/number-pattern-explorer',
                icon: '🔢',
                color: 'bg-green-100',
                borderColor: 'border-green-400'
            },
            {
                id: 'table-quiz',
                title: { bn: 'নামতার কুইজ', en: 'Number Table Quiz' },
                description: { 
                    bn: 'সময়ের সাথে পাল্লা দিয়ে নামতার উত্তর দাও!', 
                    en: 'Take a timed quiz on multiplication tables and test your speed.' 
                },
                link: 'https://mayeenulislam.github.io/number-table-quiz',
                icon: '⏱️',
                color: 'bg-pink-100',
                borderColor: 'border-pink-400'
            }
        ];

        let currentLang = 'bn';

        const content = {
            bn: {
                title: 'চটজলদি খেলা',
                subtitle: 'এসো খেলি, শিখি এবং মজা করি!',
                playBtn: 'খেলতে যাও',
                langBtn: 'English'
            },
            en: {
                title: 'Mini Games',
                subtitle: 'Let\'s play, learn and have fun together!',
                playBtn: 'Play Now',
                langBtn: 'বাংলা'
            }
        };

        function renderGames() {
            const grid = document.getElementById('gamesGrid');
            grid.innerHTML = '';

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = `game-card p-8 rounded-3xl ${game.color} border-b-8 ${game.borderColor} flex flex-col items-center text-center shadow-xl`;
                
                card.innerHTML = `
                    <div class="text-7xl mb-6 floating">${game.icon}</div>
                    <h2 class="text-3xl font-bold text-gray-800 mb-3">${game.title[currentLang]}</h2>
                    <p class="text-lg text-gray-600 mb-8 flex-grow leading-relaxed">
                        ${game.description[currentLang]}
                    </p>
                    <a href="${game.link}" target="_blank" class="w-full py-4 px-6 bg-white rounded-2xl font-bold text-xl text-gray-800 border-2 border-gray-200 hover:bg-orange-500 hover:text-white hover:border-orange-600 transition-colors shadow-sm">
                        ${content[currentLang].playBtn} →
                    </a>
                `;
                grid.appendChild(card);
            });
        }

        function toggleLanguage() {
            currentLang = currentLang === 'bn' ? 'en' : 'bn';
            updateUI();
        }

        function updateUI() {
            document.documentElement.lang = currentLang;
            document.getElementById('mainTitle').innerText = content[currentLang].title;
            document.getElementById('subTitle').innerText = content[currentLang].subtitle;
            document.getElementById('langBtn').innerText = content[currentLang].langBtn;
            renderGames();
        }

        // Initialize
        document.getElementById('year').innerText = new Date().getFullYear();
        updateUI();

    </script>
</body>
</html>
